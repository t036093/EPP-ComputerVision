<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - EPP Monitor</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    body { background-color: #0f172a; } /* Slate 900 */
    .glass-card { 
      background: rgba(30, 41, 59, 0.7); 
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
    }
    
    /* Overlay and Video Canvas styles to ensure proper stretching */
    .video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      overflow: hidden;
    }
    .video-container img, .video-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body class="text-slate-100 font-sans min-h-screen pb-10">

  <!-- Header / Nav -->
  <nav class="bg-slate-800 shadow-md mb-6 border-b border-slate-700">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex justify-between h-16 items-center flex-wrap gap-4 py-2">
              <div class="flex items-center gap-3">
                  <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                  <h1 class="text-2xl font-bold text-slate-100">Dashboard Monitor EPP</h1>
              </div>
              <div class="flex items-center gap-4 flex-wrap">
                  <a href="/analytics" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg shadow-lg transition">Analítica Avanzada &rarr;</a>
                  <div class="flex items-center gap-2">
                      <span class="text-sm text-slate-400">Filtro:</span>
                      <input type="date" value="2023-10-01" id="fechaInicio" class="bg-slate-800 border border-slate-600 text-slate-200 text-sm rounded-md px-2 py-1 outline-none focus:border-blue-500">
                      <span class="text-slate-500">-</span>
                      <input type="date" value="2023-10-07" id="fechaFin" class="bg-slate-800 border border-slate-600 text-slate-200 text-sm rounded-md px-2 py-1 outline-none focus:border-blue-500">
                  </div>
              </div>
          </div>
      </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-6">
    
    <!-- Stats Row -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="glass-card rounded-xl p-5 flex flex-col gap-1">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Total Intentos</span>
        <span class="text-3xl font-bold text-slate-100" id="val-total">0</span>
      </div>
      <div class="glass-card rounded-xl p-5 flex flex-col gap-1">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Cumplimiento Global</span>
        <span class="text-3xl font-bold text-blue-400" id="val-cumplimiento">0%</span>
      </div>
      <div class="glass-card rounded-xl p-5 flex flex-col gap-1 border-b-4 border-emerald-500">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Aprobados</span>
        <span class="text-3xl font-bold text-emerald-400" id="val-pass">0</span>
      </div>
      <div class="glass-card rounded-xl p-5 flex flex-col gap-1 border-b-4 border-red-500">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Denegados</span>
        <span class="text-3xl font-bold text-red-400" id="val-denied">0</span>
      </div>
    </div>

    <!-- Middle Row: Video & Chart -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <!-- Video Stream (Izquierda) -->
      <div class="glass-card rounded-xl p-5 flex flex-col gap-4">
        <div class="flex justify-between items-center border-b border-slate-700 pb-3">
          <h2 class="text-lg font-bold text-slate-100">Transmisión en Vivo (Kiosk)</h2>
          <span class="text-sm font-medium text-slate-400" id="statusText">Desconectado</span>
        </div>
        
        <div class="video-container rounded-lg border border-slate-700 relative">
          <!-- Banner de Ráfaga Activa -->
          <div id="admin-eval-banner" class="hidden absolute top-4 left-1/2 transform -translate-x-1/2 bg-blue-600/90 px-6 py-2 rounded-full text-lg font-bold text-white z-10 shadow-xl whitespace-nowrap border border-blue-400/50 backdrop-blur-sm">
            RÁFAGA RFID ACTIVA
          </div>
          <img id="video" />
          <canvas id="overlay"></canvas>
        </div>

        <div class="flex flex-wrap gap-2 pt-2">
          <button onclick="connectWS()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-slate-200 text-sm font-medium rounded-lg transition">1. Conectar Servidor</button>
          <button onclick="startRemoteKiosk()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 border border-slate-600 text-slate-200 text-sm font-medium rounded-lg transition">2. Iniciar Kiosk</button>
          <button onclick="stopRemoteKiosk()" class="px-4 py-2 bg-red-900/40 hover:bg-red-800/60 border border-red-500/30 text-red-400 text-sm font-medium rounded-lg transition">3. Pausar Transmisión</button>
        </div>
      </div>

      <!-- Chart (Derecha) -->
      <div class="glass-card rounded-xl p-5 flex flex-col">
        <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-700 pb-3">Tendencia Semanal de Accesos</h2>
        <div class="relative flex-1 min-h-[300px]">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

    </div>

    <!-- Bottom Row: Table -->
    <div class="glass-card rounded-xl overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-700 bg-slate-800/50">
        <h2 class="text-lg font-bold text-slate-100">Logs de Acceso Recientes</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-800/80 text-slate-400 text-xs uppercase tracking-wider">
              <th class="px-5 py-3 font-medium">ID / Hora</th>
              <th class="px-5 py-3 font-medium">Usuario</th>
              <th class="px-5 py-3 font-medium">Resultado</th>
              <th class="px-5 py-3 font-medium">EPP Detectado</th>
            </tr>
          </thead>
          <tbody id="logsTableBody" class="divide-y divide-slate-700 bg-transparent">
            <!-- JS Injects Here -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // 1. OBTENER DATOS EN VIVO (FASTAPI -> SUPABASE)
    // ==========================================
    
    async function fetchDashboardData() {
      try {
        const response = await fetch('/api/dashboard');
        const data = await response.json();
        
        if (data.error) {
          console.error("Error del servidor:", data.error);
          return;
        }

        // Actualizar Value Cards
        if (data.metrics) {
          document.getElementById('val-total').innerText = data.metrics.total_attempts || 0;
          document.getElementById('val-cumplimiento').innerText = (data.metrics.compliance_percentage || 0) + '%';
          document.getElementById('val-pass').innerText = data.metrics.total_passed || 0;
          document.getElementById('val-denied').innerText = data.metrics.total_denied || 0;
        }

        // Actualizar Tabla de Logs
        if (data.logs) {
          const tbody = document.getElementById('logsTableBody');
          tbody.innerHTML = ''; // Limpiar tabla
          
          data.logs.forEach(log => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-800/50 transition";
            
            const badgePass = `<span class="px-2 py-1 bg-emerald-900/50 text-emerald-400 text-xs font-bold rounded-full border border-emerald-500/30">PASS</span>`;
            const badgeDenied = `<span class="px-2 py-1 bg-red-900/50 text-red-400 text-xs font-bold rounded-full border border-red-500/30">DENIED</span>`;
            const badgeClass = log.status === 'PASS' ? badgePass : badgeDenied;
            
            // Determinar qué EPP faltó
            let eppDetectado = "Ok";
            if (log.status === "DENIED") {
                let faltantes = [];
                if (log.missing_hardhat) faltantes.push("Falta Casco");
                if (log.missing_vest) faltantes.push("Falta Chaleco");
                eppDetectado = faltantes.join(", ") || "Desconocido";
            } else {
                eppDetectado = "Casco y Chaleco";
            }

            // Formatear hora (de ISO a local)
            const horaLocal = new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // ID corto
            const shortId = log.id.split('-')[0];

            // Nombre de usuario
            const userName = log.users ? log.users.full_name : 'Desconocido';

            tr.innerHTML = `
              <td class="px-5 py-3 text-sm text-slate-300">
                <div class="font-mono text-xs text-slate-500">LOG-${shortId}</div>
                <div>${horaLocal}</div>
              </td>
              <td class="px-5 py-3 text-sm font-semibold text-slate-200">${userName}</td>
              <td class="px-5 py-3">${badgeClass}</td>
              <td class="px-5 py-3 text-sm text-slate-400">${eppDetectado}</td>
            `;
            tbody.appendChild(tr);
          });
        }
        
        // Actualizar Gráfica de Tendencias
        if (data.trend && typeof trendChart !== 'undefined') {
          trendChart.data.labels = data.trend.labels;
          trendChart.data.datasets[0].data = data.trend.pass;
          trendChart.data.datasets[1].data = data.trend.denied;
          trendChart.update();
        }
        
      } catch (err) {
        console.error("Error fetching dashboard data:", err);
      }
    }

    // Iniciar el ciclo de refresco cada 2 segundos
    fetchDashboardData();
    setInterval(fetchDashboardData, 2000);

    // ==========================================
    // 2. RENDERIZADO DE GRÁFICA
    // ==========================================
    const ctxChart = document.getElementById('trendChart').getContext('2d');
    const trendChart = new Chart(ctxChart, {
      type: 'line',
      data: {
        labels: ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'],
        datasets: [{
          label: 'Aprobados (PASS)',
          data: [0, 0, 0, 0, 0, 0, 0],
          borderColor: '#10b981', // emerald-500
          tension: 0.4,
          fill: true,
          backgroundColor: 'rgba(16, 185, 129, 0.1)'
        }, {
          label: 'Denegados (DENIED)',
          data: [0, 0, 0, 0, 0, 0, 0],
          borderColor: '#ef4444', // red-500
          tension: 0.4,
          fill: true,
          backgroundColor: 'rgba(239, 68, 68, 0.1)'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        color: '#f1f5f9', // slate-100
        plugins: { 
          legend: { labels: { color: '#f8fafc' } } 
        },
        scales: {
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }
        }
      }
    });

    // ==========================================
    // 3. LÓGICA DE WEBSOCKET Y VIDEO EN VIVO
    // ==========================================
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const ctx = overlay.getContext("2d");
    const statusText = document.getElementById("statusText");
    
    let ws = null;
    const MODEL_INPUT_W = 800;
    const MODEL_INPUT_H = 800;

    function connectWS() {
      const protocol = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${protocol}://${location.host}/ws?client_type=admin`);

      ws.onopen = () => {
        statusText.textContent = "Conectado. Esperando Iniciar Kiosk...";
        statusText.className = "text-sm font-medium text-emerald-400";
        overlay.width = MODEL_INPUT_W;
        overlay.height = MODEL_INPUT_H;
      };

      ws.onmessage = (event) => {
        let data;
        try {
            data = JSON.parse(event.data);
        } catch (e) {
            return;
        }

        if (data.error) {
          statusText.textContent = data.error;
          statusText.className = "text-sm font-medium text-red-400";
          if (data.image) {
            video.style.display = "block";
            video.src = "data:image/jpeg;base64," + data.image;
          }
          return;
        }

        if (data.action) return;
        
        // Banner de evaluación
        const evalBanner = document.getElementById('admin-eval-banner');
        if (data.evaluation_active) {
            evalBanner.classList.remove('hidden');
            evalBanner.innerText = `[RÁFAGA EN PROGRESO] Evaluando a: ${data.target_user}`;
        } else {
            evalBanner.classList.add('hidden');
        }

        // Renderizar Video
        if (data.image) {
          video.src = "data:image/jpeg;base64," + data.image;
        }

        if (data.status) {
          statusText.textContent = `Streaming... (${data.status})`;
        }

        drawBoxes(data.detections || []);
      };

      ws.onclose = () => {
        statusText.textContent = "Desconectado";
        statusText.className = "text-sm font-medium text-red-400";
      };
    }

    function drawBoxes(detections) {
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      const scaleX = overlay.width / MODEL_INPUT_W;
      const scaleY = overlay.height / MODEL_INPUT_H;

      detections.forEach(det => {
        if (!det.box || det.box.length < 4) return;
        let [x1, y1, x2, y2] = det.box;
        x1 *= scaleX; x2 *= scaleX; y1 *= scaleY; y2 *= scaleY;
        const boxW = x2 - x1, boxH = y2 - y1;

        ctx.lineWidth = 4;
        if (det.label === "HARDHAT" || det.label === "VEST") {
          ctx.strokeStyle = "rgba(16, 185, 129, 0.8)"; // emerald-500
          ctx.fillStyle = "rgba(16, 185, 129, 0.8)";
        } else {
          ctx.strokeStyle = "rgba(239, 68, 68, 0.8)"; // red-500
          ctx.fillStyle = "rgba(239, 68, 68, 0.8)";
        }

        ctx.strokeRect(x1, y1, boxW, boxH);
        ctx.font = "bold 18px Inter";
        const text = `${det.label} ${(det.score ?? 0).toFixed(2)}`;
        ctx.fillText(text, x1, y1 > 25 ? y1 - 8 : y1 + 24);
      });
    }

    function startRemoteKiosk() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Primero conecta al Servidor"); return;
      }
      ws.send(JSON.stringify({ action: "start_kiosk" }));
    }

    function stopRemoteKiosk() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ action: "stop_kiosk" }));
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      video.src = "";
      statusText.textContent = "Kiosk Pausado";
      statusText.className = "text-sm font-medium text-slate-400";
    }
  </script>
</body>
</html>
