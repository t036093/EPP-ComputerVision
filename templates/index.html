<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk View - EPP Monitor</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0f172a; /* slate-900 */
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #f8fafc;
            transition: box-shadow 0.5s ease-out;
        }

        /* Video Canvas - Pantalla Completa Mantenida */
        #video-canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: none;
            /* Invertir horizontalmente para efecto espejo natural */
            transform: scaleX(-1);
        }

        /* Viñeta sutil para enmarcar la cámara */
        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 50%, rgba(15, 23, 42, 0.8) 120%);
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        /* Efectos Visuales de Decisión (Flashes) usando Box Shadow Inset */
        body.flash-denied {
            box-shadow: inset 0 0 0 20px rgba(239, 68, 68, 0.8), inset 0 0 100px 20px rgba(239, 68, 68, 0.5); /* Red 500 */
        }
        body.flash-pass {
            box-shadow: inset 0 0 0 20px rgba(16, 185, 129, 0.8), inset 0 0 100px 20px rgba(16, 185, 129, 0.5); /* Emerald 500 */
        }

        /* Animación de Pulso para ícono RFID */
        @keyframes subtle-pulse {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="relative flex items-center justify-center overflow-hidden">

    <!-- Pantallas Gigantes de Decisión -->
    <div id="decision-pass" class="hidden absolute inset-0 z-50 bg-emerald-600/95 flex flex-col items-center justify-center text-white backdrop-blur-sm transition-all duration-300">
        <i class="fas fa-check-circle text-9xl mb-6 shadow-2xl rounded-full"></i>
        <h1 class="text-6xl font-black tracking-tight drop-shadow-lg">ACCESO CONCEDIDO</h1>
        <p class="text-2xl mt-4 font-medium opacity-90">Equipo de Protección Completo</p>
    </div>

    <div id="decision-denied" class="hidden absolute inset-0 z-50 bg-red-600/95 flex flex-col items-center justify-center text-white backdrop-blur-sm transition-all duration-300">
        <i class="fas fa-times-circle text-9xl mb-6 shadow-2xl rounded-full"></i>
        <h1 class="text-6xl font-black tracking-tight drop-shadow-lg">ACCESO DENEGADO</h1>
        <p class="text-2xl mt-4 font-medium opacity-90">Falta Equipo de Protección</p>
    </div>

    <!-- Dynamic RFID Prompt Popup (Appears when someone is detected) -->
    <div id="rfid-prompt-popup" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-slate-900/80 backdrop-blur-md border border-slate-600/50 p-8 rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] z-10 flex-col items-center justify-center transition-opacity duration-300 w-3/4 max-w-md">
        
        <!-- Animated RFID Icon -->
        <div class="mb-6 text-blue-400 animate-subtle-pulse">
            <svg class="w-24 h-24 opacity-90 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-bold tracking-tight text-white mb-2 text-center">¡Hola!</h2>
        <p class="text-lg text-slate-300 font-light text-center">Por favor, escanea tu gafete RFID para identificarte.</p>
    </div>
    
    <!-- Banner de Evaluación (HUD Style) -->
    <div id="evaluation-banner" class="hidden absolute top-12 left-1/2 transform -translate-x-1/2 bg-slate-900/80 backdrop-blur-md border border-blue-500/50 px-8 py-4 rounded-2xl shadow-[0_0_30px_rgba(59,130,246,0.3)] z-20 flex flex-col items-center gap-1 transition-all">
        <span class="text-sm font-bold text-blue-400 uppercase tracking-widest animate-pulse">Ráfaga de Análisis Activa</span>
        <span id="eval-target-user" class="text-2xl md:text-3xl font-bold text-white whitespace-nowrap">Usuario...</span>
    </div>
    
    <!-- Visible elements -->
    <canvas id="video-canvas" width="640" height="640"></canvas>
    <div id="vignette" class="vignette-overlay"></div>
    
    <!-- Hidden elements for processing -->
    <video id="webcam" autoplay playsinline style="display:none;"></video>
    <canvas id="hidden-canvas" width="640" height="640" style="display:none;"></canvas>

    <script>
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const hiddenCtx = hiddenCanvas.getContext('2d');
        const video = document.getElementById('webcam');
        const rfidPrompt = document.getElementById('rfid-prompt-popup');
        const vignette = document.getElementById('vignette');
        
        let localStream = null;
        let animationFrameId = null;
        let lastServerImage = null;
        let latestDetections = []; // Almacena las bounding boxes recibidas
        let popupTimeout = null;

        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${location.host}/ws?client_type=kiosk`);

        socket.onopen = () => {
            console.log("WebSocket connected. Waiting for kiosk commands.");
        };

        socket.onmessage = (event) => {
            isWaitingForServer = false; // Liberamos el envío para el siguiente frame
            let data;
            try {
                data = JSON.parse(event.data);
            } catch (e) {
                return;
            }

            if (data.action === "start_kiosk") startKiosk();
            else if (data.action === "stop_kiosk") stopKiosk();
            
            // Si el backend nos envía una decisión definitiva en este frame, mostramos pantalla completa
            if (data.final_decision) {
                showFullscreenDecision(data.final_decision);
            }
            
            else if (data.status) {
                if (data.status === "DENIED") flashBorder("flash-denied");
                else if (data.status === "PASS") flashBorder("flash-pass");
                
                // Actualizar banner de evaluación
                const banner = document.getElementById('evaluation-banner');
                const targetUserSpan = document.getElementById('eval-target-user');
                if (data.evaluation_active) {
                    banner.classList.remove('hidden');
                    banner.classList.add('flex');
                    targetUserSpan.innerText = data.target_user || 'Desconocido';
                } else {
                    banner.classList.add('hidden');
                    banner.classList.remove('flex');
                }
                
                // Actualizar las detecciones y mostrar/ocultar el pop-up inteligentemente
                if (data.detections) {
                    latestDetections = data.detections;
                    
                    // Lógica del Pop-up: Mostrar si hay alguien detectado y no hay evaluación activa
                    if (data.detections.length > 0 && !data.evaluation_active) {
                        rfidPrompt.classList.remove('hidden');
                        rfidPrompt.classList.add('flex');
                        
                        // Renovar el temporizador para ocultar si la persona se va
                        if (popupTimeout) clearTimeout(popupTimeout);
                        popupTimeout = setTimeout(() => {
                            rfidPrompt.classList.add('hidden');
                            rfidPrompt.classList.remove('flex');
                        }, 2000); // Ocultar tras 2 segundos sin detecciones
                    }
                }
                
                // Si la evaluación arranca, esconder forzosamente el pop-up de prompt
                if (data.evaluation_active) {
                    rfidPrompt.classList.add('hidden');
                    rfidPrompt.classList.remove('flex');
                }
            }
        };

        async function startKiosk() {
            if (localStream) {
                // Si la cámara ya está activa, solo reanudamos la transmisión
                canvas.style.display = 'block';
                vignette.style.display = 'block';
                
                lastServerImage = null;
                if (!animationFrameId) sendFrame();
                return;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 640, facingMode: "user" }
                });
                video.srcObject = localStream;
                video.onloadedmetadata = () => {
                    video.play();
                    
                    canvas.style.display = 'block';
                    vignette.style.display = 'block';

                    lastServerImage = null;
                    if (!animationFrameId) renderLoop();
                };
            } catch (err) {
                console.error("Camera access error:", err);
            }
        }

        function stopKiosk() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            cancelAnimationFrame(animationFrameId);
            ctx.clearRect(0, 0, 640, 640);
            canvas.style.display = 'none';
            vignette.style.display = 'none';
            
            // Ocultar prompts
            rfidPrompt.classList.add('hidden');
            rfidPrompt.classList.remove('flex');
        }

        let lastSendTime = 0;
        let isWaitingForServer = false; // BACKPRESSURE: Evita asfixiar al servidor

        function renderLoop() {
            if (!localStream) return;

            // Display raw video frame to user at 60 FPS for a smooth mirror effect
            // Como usamos scaleX(-1) en CSS, necesitamos voltear el contexto de dibujo para que no quede al revés
            ctx.save();
            ctx.translate(640, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 640, 640);
            
            // Dibujar las bounding boxes sobre el video (dentro del contexto invertido)
            drawBoxes(latestDetections);
            ctx.restore();

            // Solo enviamos si han pasado 100ms Y el servidor ya terminó de procesar la anterior
            const now = Date.now();
            if (!isWaitingForServer && (now - lastSendTime > 100)) {
                lastSendTime = now;
                isWaitingForServer = true; // Bloqueamos envíos hasta recibir respuesta
                
                hiddenCtx.drawImage(video, 0, 0, 640, 640);
                if (socket.readyState === WebSocket.OPEN) {
                    const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.6);
                    const base64 = dataUrl.split(',')[1];
                    socket.send(JSON.stringify({ image: base64 }));
                } else {
                    isWaitingForServer = false;
                }
            }

            animationFrameId = requestAnimationFrame(renderLoop);
        }

        function flashBorder(className) {
            document.body.classList.add(className);
            setTimeout(() => {
                document.body.classList.remove(className);
            }, 1000);
        }

        // Dibuja las bounding boxes en el Kiosko
        function drawBoxes(detections) {
            detections.forEach(det => {
                if (!det.box || det.box.length < 4) return;
                let [x1, y1, x2, y2] = det.box;
                const boxW = x2 - x1, boxH = y2 - y1;

                ctx.lineWidth = 5;
                if (det.label === "HARDHAT" || det.label === "VEST") {
                    ctx.strokeStyle = "rgba(16, 185, 129, 0.9)"; // Emerald
                    ctx.fillStyle = "rgba(16, 185, 129, 0.9)";
                } else {
                    ctx.strokeStyle = "rgba(239, 68, 68, 0.9)"; // Red
                    ctx.fillStyle = "rgba(239, 68, 68, 0.9)";
                }

                // Esquinas redondeadas personalizadas simuladas
                ctx.strokeRect(x1, y1, boxW, boxH);
                
                ctx.font = "bold 22px Inter, sans-serif";
                const text = `${det.label} ${(det.score ?? 0).toFixed(2)}`;
                
                // Fondo oscuro para el texto para mayor legibilidad
                const textWidth = ctx.measureText(text).width;
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(x1, y1 > 35 ? y1 - 30 : y1, textWidth + 10, 30);
                
                // Texto de la clase
                if (det.label === "HARDHAT" || det.label === "VEST") {
                    ctx.fillStyle = "rgba(16, 185, 129, 1)";
                } else {
                    ctx.fillStyle = "rgba(239, 68, 68, 1)";
                }
                ctx.fillText(text, x1 + 5, y1 > 35 ? y1 - 8 : y1 + 22);
            });
        }
        function showFullscreenDecision(decision) {
            const screenId = decision === "PASS" ? "decision-pass" : "decision-denied";
            const screen = document.getElementById(screenId);
            if (!screen) return;
            
            screen.classList.remove('hidden');
            screen.classList.add('flex');
            
            setTimeout(() => {
                screen.classList.remove('flex');
                screen.classList.add('hidden');
                
                if (video && video.paused) {
                    video.play().catch(e => console.log("Video resume error:", e));
                }
            }, 3000);
        }
    </script>
</body>
</html>
